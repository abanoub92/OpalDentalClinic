<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- التدرج اللوني الدافئ الفاخر المستوحى تماماً من خلفية اللوجو الأصلي -->
    <radialGradient id="opal-bronze" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#e3c3aa" />
      <stop offset="45%" stop-color="#b08968" />
      <stop offset="100%" stop-color="#54371e" />
    </radialGradient>
    
    <!-- فلتر لإضافة ظل خفيف وناعم للعناصر البيضاء لتبرز بوضوح وفخامة فوق الخلفية التدرجية -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- خلفية دائرية ناعمة تحاكي تصميم اللوجو الفاخر وتناسب الأبعاد القياسية للفافيكون -->
  <circle cx="256" cy="256" r="240" fill="url(#opal-bronze)" />

  <!-- مجموعة كلمة Opal الفنية بخط اليد مجمعة ومقاسة لتتوسط الدائرة بشكل ممتاز بعد إزالة العناصر الأخرى -->
  <g transform="translate(256, 256) scale(1.15)" filter="url(#soft-shadow)">
    <!-- تم ضبط الإحداثيات هنا (-225, -300) لتتمركز الكلمة رياضياً وبصرياً في منتصف الـ Canvas تماماً -->
    <g transform="translate(-225, -300)">
      <!-- حرف O الكبير المنساب والملتف -->
      <path d="M 140 120
               C 70 120, 40 220, 50 310
               C 60 400, 120 440, 170 410
               C 220 380, 240 280, 230 190
               C 220 100, 180 70, 140 120 Z" 
            fill="none" 
            stroke="#ffffff" 
            stroke-width="14" 
            stroke-linecap="round" 
            stroke-linejoin="round" />
      
      <!-- خط البداية الممتد والمنساب من داخل حرف O -->
      <path d="M 145 190 L 140 370" 
            fill="none" 
            stroke="#ffffff" 
            stroke-width="10" 
            stroke-linecap="round" />

      <!-- حرف p والامتداد الطويل لأسفل -->
      <path d="M 235 230 
               C 220 280, 210 390, 190 490" 
            fill="none" 
            stroke="#ffffff" 
            stroke-width="11" 
            stroke-linecap="round" />
      <path d="M 215 320 
               C 235 280, 275 285, 270 330
               C 265 375, 220 375, 210 365" 
            fill="none" 
            stroke="#ffffff" 
            stroke-width="11" 
            stroke-linejoin="round" />

      <!-- حرف a الانسيابي الدافئ -->
      <path d="M 290 335 
               C 280 305, 315 305, 325 330
               C 335 355, 310 370, 290 365
               C 275 360, 275 345, 290 335 Z" 
            fill="none" 
            stroke="#ffffff" 
            stroke-width="10" 
            stroke-linejoin="round" />
      <path d="M 320 325 C 322 345, 325 360, 335 365" 
            fill="none" 
            stroke="#ffffff" 
            stroke-width="10" 
            stroke-linecap="round" />

      <!-- حرف l الانسيابي الممتد للأعلى والملتف لليمين -->
      <path d="M 330 360 
               C 350 340, 390 230, 400 170
               C 410 110, 385 140, 365 240
               C 355 290, 345 365, 345 385" 
            fill="none" 
            stroke="#ffffff" 
            stroke-width="11" 
            stroke-linecap="round" 
            stroke-linejoin="round" />
    </g>
  </g>
</svg>
